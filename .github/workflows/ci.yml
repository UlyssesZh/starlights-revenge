name: CI
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: sudo apt-get install -y ruby imagemagick

      - name: Build
        run: ./build.rb

      - name: Upload web artifacts
        uses: actions/upload-artifact@v7
        with:
          name: web
          path: web

  upload:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref_name == 'master' && false
    steps:
      - name: Set up butler
        uses: remarkablegames/setup-butler@v3

      - name: Download web artifacts
        uses: actions/download-artifact@v8
        with:
          name: web
          path: web

      - name: Upload to itch.io
        run: butler push web "$ITCHIO_PROJECT:web"
        env:
          ITCHIO_PROJECT: UlyssesZhan/starlights-revenge
          BUTLER_API_KEY: ${{ secrets.ITCHIO_API_KEY }}
